name: Lint

on: [pull_request]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust (nightly)
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          toolchain: nightly
          components: rustfmt

      - name: Check with rustfmt
        run: cargo fmt --all -- --check

  clippy:
    permissions:
      contents: read
      checks: write # to add clippy checks to PR diffs

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          components: clippy

      - name: Check with Clippy
        uses: giraffate/clippy-action@13b9d32482f25d29ead141b79e7e04e7900281e0 # v1.0.1
        with:
          reporter: github-pr-check
          github_token: ${{ secrets.GITHUB_TOKEN }}
          clippy_flags: >-
            --workspace --all-features --exclude actix-settings --tests --examples --bins --
            -A unknown_lints -D clippy::todo -D clippy::dbg_macro

      - name: Check actix-settings with Clippy
        run: |
          cargo clippy -p actix-settings --tests --examples --bins -- -A unknown_lints -D clippy::todo -D clippy::dbg_macro
          cargo clippy -p actix-settings --all-targets --features openssl -- -A unknown_lints -D clippy::todo -D clippy::dbg_macro
          cargo clippy -p actix-settings --all-targets --features rustls-0_23 -- -A unknown_lints -D clippy::todo -D clippy::dbg_macro
